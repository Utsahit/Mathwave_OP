name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elixir_oak
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npx prisma validate

      - name: TypeScript build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Prisma migrate status
        run: npx prisma migrate status
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/elixir_oak?schema=public

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/elixir_oak?schema=public
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-jwt-secret-min-32-chars-long!!' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-test-refresh-secret-min-32-chars-long' }}
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: rzp_secret_ci
          SMTP_HOST: localhost
          SMTP_PORT: 1025
